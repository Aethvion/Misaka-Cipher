name: Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint — syntax errors and undefined names
      run: |
        flake8 core apps \
          --count --select=E9,F63,F7,F82 \
          --show-source --statistics \
          --exclude=__pycache__,.venv,venv,env

    - name: Lint — style warnings (non-blocking)
      run: |
        flake8 core apps \
          --count --exit-zero \
          --max-complexity=10 --max-line-length=127 --statistics \
          --exclude=__pycache__,.venv,venv,env

    - name: Check for leaked secrets
      run: |
        ! grep -r "sk-[a-zA-Z0-9]" --include="*.py" --include="*.yaml" --exclude-dir=".git" . \
          || (echo "Potential OpenAI API key found" && exit 1)
        ! grep -r "AIza[a-zA-Z0-9]" --include="*.py" --include="*.yaml" --exclude-dir=".git" . \
          || (echo "Potential Google API key found" && exit 1)

  html-lint:
    name: HTML Structure & Validity
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Install HTMLHint
      run: npm install -g htmlhint

    - name: Validate full HTML pages
      # Full documents: index.html, login.html, app viewer pages
      run: |
        find core apps -name "*.html" \
          ! -path "*/partials/*" \
          ! -path "*/.venv/*" \
          ! -path "*/.claude/*" \
          | xargs htmlhint \
            --rules "tag-pair=true,id-unique=true,attr-no-duplication=true,tagname-lowercase=true,attr-value-double-quotes=true,doctype-first=true,spec-char-escape=false"

    - name: Validate HTML partials (fragments — no doctype required)
      # Partials are injected at runtime; they are valid fragments, not full documents
      run: |
        find core/interfaces/dashboard/static/partials -name "*.html" \
          | xargs htmlhint \
            --rules "tag-pair=true,id-unique=true,attr-no-duplication=true,tagname-lowercase=true,attr-value-double-quotes=true,spec-char-escape=false"

  test:
    name: Import & Structure Checks
    needs: [lint, html-lint]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install core dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pyyaml python-dotenv psutil rich requests

    - name: Verify package structure
      run: |
        python -c "import yaml; print('pyyaml OK')"
        python -c "import fastapi; print('fastapi OK')"
        python -c "import rich; print('rich OK')"

    - name: Verify core module imports resolve
      run: |
        python -c "from core.utils import get_logger; print('core.utils OK')"
        python -c "from core.memory.memory_spec import EpisodicEntry; print('core.memory OK')"
        python -c "from core.workspace.preferences_manager import get_preferences_manager; print('core.workspace OK')"

    - name: Verify entry point exists
      run: |
        python -c "import importlib.util; spec = importlib.util.find_spec('core.main'); assert spec, 'core.main not found'; print('core.main OK')"