<div id="explained-container" class="explained-container">
    <!-- Prompt Sidebar (Collapsible) -->
    <aside id="explained-sidebar" class="explained-sidebar">
        <div class="es-header">
            <h3><i class="fas fa-magic"></i> AI Explainer</h3>
            <div class="es-header-actions">
                <button id="explained-new-btn" class="icon-btn xs-btn" title="New Explanation (Clear)">
                    <i class="fas fa-plus"></i>
                </button>
                <button id="explained-collapse-btn" class="icon-btn xs-btn" title="Collapse Prompt Bar">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
        </div>
        
        <div class="es-content">
            <div class="es-field">
                <label>What should I explain?</label>
                <textarea id="explained-prompt" placeholder="e.g. The lore of Elden Ring, how quantum computing works..."></textarea>
            </div>

            <div class="es-field">
                <label>Model</label>
                <select id="explained-model-select">
                    <!-- Populated via JS -->
                    <option value="auto">Auto Select</option>
                </select>
            </div>

            <div class="es-field">
                <div class="es-toggle-row">
                    <div class="es-toggle-info">
                        <label>Deep Dive Mode</label>
                        <span class="es-toggle-hint">Multi-page structure for large topics</span>
                    </div>
                    <label class="es-toggle-switch" title="Enable Deep Dive multi-page mode">
                        <input type="checkbox" id="explained-deep-dive-toggle">
                        <span class="es-toggle-knob"></span>
                    </label>
                </div>
            </div>
            
            <button id="explained-generate-btn" class="primary-btn wide-btn">
                <i class="fas fa-wand-sparkles"></i> Build Page
            </button>

            <button id="explained-folder-btn" class="es-folder-btn hidden" title="Open output folder in Explorer">
                <i class="fas fa-folder-open"></i> Open Folder
            </button>

            <div id="explained-status-area" class="es-status" style="display: none;">
                <div class="es-loader">
                    <div class="es-spinner"></div>
                    <span id="explained-status-text">Thinking...</span>
                </div>
                <div class="es-progress-bar">
                    <div id="explained-progress-fill" class="es-progress-fill"></div>
                </div>
                <div id="explained-logs" class="es-logs">
                    <!-- Real-time logs go here -->
                </div>
            </div>
            
            <div id="explained-usage-card" class="es-usage-card hidden">
                <div class="esu-header">
                    <i class="fas fa-chart-pie"></i> Creation Details
                </div>
                <div class="esu-list">
                    <div class="esu-row" title="Model Used">
                        <span class="esu-label">Model:</span>
                        <span id="esu-model" class="esu-value">-</span>
                    </div>
                    <div class="esu-row" title="Total Tokens (In + Out)">
                        <span class="esu-label">Tokens:</span>
                        <span id="esu-tokens" class="esu-value">-</span>
                    </div>
                    <div class="esu-row" title="Estimated USD Cost">
                        <span class="esu-label">Cost:</span>
                        <span id="esu-cost" class="esu-value">$0.00</span>
                    </div>
                    <div class="esu-row" title="Time taken to generate">
                        <span class="esu-label">Duration:</span>
                        <span id="esu-duration" class="esu-value">0s</span>
                    </div>
                </div>
            </div>

            <div class="es-history">
                <label>Past Explanations</label>
                <div id="explained-history-list" class="es-list">
                    <!-- Populated via JS -->
                    <div class="es-empty">No history yet</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Expanding Toggle (visible when sidebar is collapsed) -->
    <button id="explained-expand-btn" class="explained-expand-btn hidden" title="Expand Prompt Bar">
        <i class="fas fa-chevron-right"></i>
    </button>

    <!-- Main Output View -->
    <main class="explained-main">
        <!-- Multi-page navigator (Deep Dive mode only) -->
        <nav id="explained-page-nav" class="explained-page-nav hidden">
            <span class="epn-label"><i class="fas fa-sitemap"></i> Pages</span>
            <div id="explained-page-tabs" class="epn-tabs"></div>
        </nav>

        <div id="explained-output-wrapper" class="explained-output-wrapper">
            <!-- Iframe or Div for the generated content -->
            <div id="explained-placeholder" class="explained-placeholder">
                <div class="ep-content">
                    <div class="ep-icon"><i class="fas fa-lightbulb"></i></div>
                    <h2>Visionary Explanations</h2>
                    <p>Enter a topic on the left to generate an immersive, visual explanation page.</p>
                </div>
            </div>
            <iframe id="explained-frame" class="explained-frame hidden" frameborder="0"></iframe>
        </div>
    </main>
</div>
