<div class="three-column-layout">
                    <!-- Far Left: Thread List -->
                    <div class="column threads-column">
                        <div class="column-header">
                            <button id="new-thread-button" class="new-thread-button" title="New Thread (Ctrl+T)" aria-label="New thread">+</button>
                            <button id="incognito-thread-button" class="incognito-thread-button" title="Incognito Chat (Ephemeral)" aria-label="Incognito chat">
                                <i class="fas fa-user-secret" aria-hidden="true"></i>
                            </button>
                            <button id="new-folder-button" class="new-folder-button" title="New Folder" aria-label="New folder">
                                <i class="fas fa-folder-plus" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="threads-search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="threads-search" placeholder="Search threads…" autocomplete="off">
                        </div>
                        <div class="threads-list" id="threads-list">
                            <!-- Threads will be populated here -->
                        </div>
                    </div>

                    <!-- Thread item template -->
                    <template id="thread-item-template">
                        <div class="thread-item">
                            <div class="thread-line-1">
                                <span class="thread-title"></span>
                                <div class="thread-actions">
                                    <button class="thread-action-btn folder-move-btn" title="Move to folder" aria-label="Move to folder">
                                        <i class="fas fa-folder" aria-hidden="true"></i>
                                    </button>
                                    <button class="thread-action-btn pin-btn" title="Pin thread" aria-label="Pin thread">
                                        <i class="fas fa-thumbtack" aria-hidden="true"></i>
                                    </button>
                                    <button class="thread-action-btn edit-btn" title="Rename thread" aria-label="Rename thread">
                                        <i class="fas fa-pencil-alt" aria-hidden="true"></i>
                                    </button>
                                    <button class="thread-action-btn delete-btn" title="Delete thread" aria-label="Delete thread">
                                        <i class="fas fa-trash" aria-hidden="true"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="thread-line-2">
                                <div class="thread-preview"></div>
                            </div>
                            <div class="thread-meta">
                                <span class="thread-meta-count"></span>
                                <span class="thread-meta-sep">·</span>
                                <span class="thread-meta-time"></span>
                                <span class="thread-meta-model"></span>
                            </div>
                        </div>
                    </template>

                    <!-- Folder group template -->
                    <template id="folder-group-template">
                        <div class="folder-group">
                            <div class="folder-header">
                                <button class="folder-toggle-btn" title="Collapse / expand" aria-label="Toggle folder">
                                    <i class="fas fa-chevron-down" aria-hidden="true"></i>
                                </button>
                                <span class="folder-color-dot"></span>
                                <span class="folder-name"></span>
                                <span class="folder-thread-count"></span>
                                <div class="folder-actions">
                                    <button class="folder-action-btn folder-settings-btn" title="Folder settings" aria-label="Folder settings">
                                        <i class="fas fa-cog" aria-hidden="true"></i>
                                    </button>
                                    <button class="folder-action-btn folder-delete-btn" title="Delete folder" aria-label="Delete folder">
                                        <i class="fas fa-trash" aria-hidden="true"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="folder-threads"></div>
                        </div>
                    </template>

                    <!-- Resize handle: threads | chat -->
                    <div class="col-resize-handle" id="resize-threads-chat" title="Drag to resize"></div>

                    <!-- Center: Chat Interface -->
                    <div class="column chat-column">
                        <div class="column-header">
                            <div style="display: flex; align-items: center; gap: 0.8rem;">
                                <button id="toggle-threads-btn" class="icon-btn" title="Toggle Threads History" aria-label="Toggle Threads History">
                                    <i class="fas fa-history" aria-hidden="true"></i>
                                </button>
                                <button id="header-new-thread-btn" class="icon-btn" title="New Chat" aria-label="New chat thread">
                                    <i class="fas fa-plus" aria-hidden="true"></i>
                                </button>
                                <h2 id="active-thread-title">Main Thread</h2>
                            </div>
                            <div class="global-chat-controls">
                                <!-- CTX -->
                                <div class="control-item" title="Context Mode">
                                    <label>CTX</label>
                                    <select id="global-ctx-mode" class="control-select">
                                        <option value="none">None</option>
                                        <option value="smart" selected>Smart</option>
                                        <option value="full">Full</option>
                                    </select>
                                </div>
                                <!-- WIN -->
                                <div class="control-item" title="Context Window">
                                    <label>WIN</label>
                                    <input type="number" id="global-ctx-window" class="control-select" min="1" max="50"
                                        value="5" style="width: 45px; text-align: center;">
                                </div>
                                <!-- MEM -->
                                <div class="control-item" title="Persistent Memory">
                                    <label>MEM</label>
                                    <select id="chat-memory-mode" class="control-select">
                                        <option value="enabled" selected>On</option>
                                        <option value="nomemory">Off</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Normal chat messages -->
                        <div class="chat-messages" id="chat-messages">
                            <div class="message system-message">
                                <div class="message-content">
                                    <strong>System:</strong> Chat initialized. Ask me anything.
                                </div>
                            </div>
                            <div id="chat-typing-indicator" class="message ai-message typing-indicator" style="display: none;">
                                <div class="message-content">
                                    <span class="typing-text">Working...</span>
                                </div>
                            </div>
                        </div>

                        <!-- Inline folder settings view (replaces chat-messages when editing a folder) -->
                        <div id="folder-settings-view" class="folder-sv" style="display:none;" aria-label="Folder settings">
                            <div class="folder-sv-inner">

                                <!-- Name + Color row -->
                                <div class="folder-sv-row folder-sv-row--split">
                                    <div class="folder-sv-field" style="flex:1;">
                                        <label class="folder-sv-label" for="folder-sv-name">
                                            <i class="fas fa-folder-open" aria-hidden="true"></i>
                                            Folder Name
                                        </label>
                                        <input type="text" id="folder-sv-name" class="folder-sv-input"
                                            placeholder="e.g. Project Alpha" maxlength="60" autocomplete="off">
                                    </div>
                                    <div class="folder-sv-field">
                                        <label class="folder-sv-label">Color</label>
                                        <div id="folder-sv-colors" class="folder-sv-colors">
                                            <button class="folder-sv-swatch" data-color="#6366f1" style="background:#6366f1;" title="Indigo" aria-label="Indigo"></button>
                                            <button class="folder-sv-swatch" data-color="#10b981" style="background:#10b981;" title="Emerald" aria-label="Emerald"></button>
                                            <button class="folder-sv-swatch" data-color="#f59e0b" style="background:#f59e0b;" title="Amber" aria-label="Amber"></button>
                                            <button class="folder-sv-swatch" data-color="#ef4444" style="background:#ef4444;" title="Red" aria-label="Red"></button>
                                            <button class="folder-sv-swatch" data-color="#3b82f6" style="background:#3b82f6;" title="Blue" aria-label="Blue"></button>
                                            <button class="folder-sv-swatch" data-color="#ec4899" style="background:#ec4899;" title="Pink" aria-label="Pink"></button>
                                            <button class="folder-sv-swatch" data-color="#8b5cf6" style="background:#8b5cf6;" title="Violet" aria-label="Violet"></button>
                                            <button class="folder-sv-swatch" data-color="#64748b" style="background:#64748b;" title="Slate" aria-label="Slate"></button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Folder Context -->
                                <div class="folder-sv-field">
                                    <label class="folder-sv-label" for="folder-sv-context">
                                        <i class="fas fa-align-left" aria-hidden="true"></i>
                                        Folder Context
                                    </label>
                                    <p class="folder-sv-hint">Automatically prepended to every chat in this folder. Describe the project, tech stack, conventions, etc.</p>
                                    <textarea id="folder-sv-context" class="folder-sv-textarea" rows="5"
                                        placeholder="e.g. This folder is for Project Alpha. Backend: Python/FastAPI. Frontend: React. Always follow PEP-8."></textarea>
                                </div>

                                <!-- Shared Memory -->
                                <div class="folder-sv-field">
                                    <label class="folder-sv-label" for="folder-sv-memory">
                                        <i class="fas fa-brain" aria-hidden="true"></i>
                                        Shared Memory
                                    </label>
                                    <p class="folder-sv-hint">Key facts shared across all chats in this folder — server addresses, team contacts, recurring references, etc.</p>
                                    <textarea id="folder-sv-memory" class="folder-sv-textarea" rows="5"
                                        placeholder="e.g. DB host: db.internal:5432&#10;Lead dev: Alice (alice@example.com)&#10;Staging: https://staging.example.com"></textarea>
                                </div>

                                <!-- Actions -->
                                <div class="folder-sv-actions">
                                    <button id="folder-sv-cancel" class="folder-sv-btn folder-sv-btn--ghost">
                                        <i class="fas fa-times" aria-hidden="true"></i>
                                        Cancel
                                    </button>
                                    <button id="folder-sv-save" class="folder-sv-btn folder-sv-btn--primary">
                                        <i class="fas fa-check" aria-hidden="true"></i>
                                        Save Folder
                                    </button>
                                </div>

                            </div>
                        </div>

                        <div class="chat-interface-wrapper">
                            <textarea id="chat-input" class="chat-input" rows="1"
                                placeholder="Ask me anything... (e.g., 'Analyze TSLA stock outlook')"
                                autocomplete="off"></textarea>

                            <div class="input-controls">
                                <div class="controls-left">
                                    <button class="icon-btn add-file-btn" title="Add File" aria-label="Attach file">
                                        <i class="fas fa-plus" aria-hidden="true"></i>
                                    </button>
                                    <input type="file" id="chat-file-input" style="display:none;" accept="*/*">

                                    <select id="model-select" class="control-select"
                                        title="Select Chat Profile / Model">
                                        <option value="auto">Auto</option>
                                    </select>
                                    <button id="search-toggle" class="icon-btn search-btn" title="Internet Search" aria-label="Toggle internet search">
                                        <i class="fas fa-search" aria-hidden="true"></i>
                                    </button>
                                </div>

                                <div class="controls-right">
                                    <button id="voice-mode-toggle" class="icon-btn voice-btn" title="Voice Mode" aria-label="Toggle voice mode">
                                        <i class="fas fa-microphone" aria-hidden="true"></i>
                                    </button>
                                    <button id="send-button" class="send-button" aria-label="Send message">
                                        <i class="fas fa-paper-plane" aria-hidden="true"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
