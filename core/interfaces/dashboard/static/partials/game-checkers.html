<div class="game-header">
                    <div class="game-header-left">
                        <button class="back-to-home-btn" onclick="switchMainTab('games-center')" title="Back to Games Center" style="margin-right: 1rem;">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span class="game-icon">🔴</span>
                        <div class="game-title-block">
                            <h2>Checkers</h2>
                            <p class="game-subtitle">Classic Board Game vs AI</p>
                        </div>
                    </div>
                    <div class="game-toolbar" style="background:transparent; border:none; margin:0; padding:0 15px;">
                        <select id="chk-difficulty-select" class="control-select">
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                        <button id="chk-restart-btn" class="action-btn secondary">New Game</button>
                    </div>
                </div>

                <div class="checkers-layout">
                    <div class="chk-status-bar" id="chk-status-bar">Waiting to start...</div>

                    <div class="chk-main">
                        <div class="chk-board-container">
                            <div id="chk-board" class="chk-board"></div>
                        </div>
                    </div>

                    <div class="chk-sidebar" style="justify-content: center;">
                        <div class="chk-player-card" id="chk-player1-card">
                            <div class="color-indicator" style="background: #00d9ff; box-shadow: 0 0 10px #00d9ff;">
                            </div>
                            <span>You (Blue)</span>
                        </div>
                        <div class="chk-player-card" id="chk-player2-card">
                            <div class="color-indicator" style="background: #ff4757; box-shadow: 0 0 10px #ff4757;">
                            </div>
                            <span>Nexus AI (Red)</span>
                        </div>
                    </div>

                    <div id="game-overlay-checkers" class="game-overlay" style="display:none;">
                        <div class="overlay-title" id="chk-win-title">GAME OVER</div>
                        <button class="game-btn" onclick="document.getElementById('chk-restart-btn').click();">Play
                            Again</button>
                    </div>
                </div>
