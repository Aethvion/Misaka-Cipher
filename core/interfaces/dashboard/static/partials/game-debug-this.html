<div class="game-layout">
    <!-- Header -->
    <div class="game-header">
        <div class="game-header-left">
            <button class="back-to-home-btn" onclick="switchMainTab('games-center')" title="Back to Games Center" style="margin-right: 1rem;">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span class="game-icon">🐛</span>
            <div class="game-title-block">
                <h2>Debug This!</h2>
                <p class="game-subtitle">[Neural Troubleshooting] — AI Generated</p>
            </div>
        </div>
        <div class="game-vitals">
            <div class="game-stat">
                <span class="stat-label">Level</span>
                <span id="dt-level-display" class="stat-value">1</span>
            </div>
            <div class="game-stat">
                <span class="stat-label">Streak</span>
                <span id="dt-streak-display" class="stat-value">0</span>
            </div>
            <button class="action-btn small secondary" id="dt-reset-btn" title="New Bug"><i class="fas fa-bug"></i></button>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="game-toolbar">
        <label>Model:</label>
        <select id="dt-model-select" class="control-select"></select>
        <div class="game-toolbar-divider"></div>
        <label>Difficulty:</label>
        <select id="dt-difficulty-select" class="control-select">
            <option value="easy">Novice</option>
            <option value="medium" selected>Pro</option>
            <option value="hard">Veteran</option>
            <option value="expert">Masochist</option>
        </select>
        <div class="toolbar-spacer"></div>
        <button class="game-btn secondary" id="dt-hint-btn" style="padding: 0.35rem 0.8rem; font-size: 0.75rem;">Get Bug Hint</button>
    </div>

    <div class="game-main">
        <div class="game-canvas debug-canvas">
            <div class="section-label">MISSION OBJECTIVE</div>
            <div id="dt-description" class="dt-desc">Find and fix the bug in the code below.</div>
            
            <div class="debug-editor-container">
                <div class="code-box solo-box">
                    <div class="code-box-header">
                        <span>Source Code <span id="dt-lang-badge" class="lang-badge"></span></span>
                        <span id="dt-bug-hint" class="bug-hint-text"></span>
                    </div>
                    <textarea id="dt-code-input" class="code-input" placeholder="Loading bug..."></textarea>
                </div>
            </div>

            <div class="dt-actions">
                <button id="dt-submit-btn" class="game-btn primary" disabled><i class="fas fa-hammer"></i> Apply Fix</button>
            </div>

            <!-- Start Screen Overlay -->
            <div id="game-overlay-debug-this-start" class="game-overlay">
                <div class="overlay-title" style="color:var(--text-primary)">SQUASH BUGS</div>
                <div class="overlay-subtitle" style="margin-bottom: 2rem;">A single logical error exists in the code.<br>Identify, fix, and submit.</div>
                <button class="game-btn" onclick="startDebugThis()" id="dt-start-btn">Search for Bugs</button>
            </div>

            <!-- Result Overlay -->
            <div id="game-overlay-debug-this" class="game-overlay" style="display:none;">
                <div class="overlay-title" id="dt-result-title">BUG SQUASHED!</div>
                <div class="overlay-subtitle" id="dt-result-msg"></div>
                <div class="overlay-score" id="dt-result-xp">XP Gained: 0</div>
                <button class="game-btn" onclick="startDebugThis()">Next Target</button>
            </div>
        </div>

        <div class="game-card debug-card">
            <div class="section-label">DIAGNOSTIC LOGS</div>
            <div id="dt-logs" class="dt-logs">
                <div class="placeholder-text">System scans clean...</div>
            </div>
        </div>
    </div>
</div>

<style>
.debug-canvas {
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    background: var(--surface-1);
}
.dt-desc {
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: var(--surface-2);
    border-left: 4px solid #f87171;
    border-radius: 4px;
    font-size: 0.95rem;
}
.debug-editor-container {
    flex: 1;
    min-height: 400px;
}
.solo-box {
    height: 100%;
}
.bug-hint-text {
    font-size: 0.75rem;
    color: var(--primary);
    font-style: italic;
}
.dt-actions {
    margin-top: 1.5rem;
    display: flex;
    justify-content: center;
}
.dt-logs {
    background: #1a1a2e;
    color: #e94560;
    font-family: 'Fira Code', monospace;
    padding: 1rem;
    border-radius: 8px;
    height: 150px;
    overflow-y: auto;
    font-size: 0.85rem;
    border: 1px solid var(--border);
}
.debug-card {
    display: flex;
    flex-direction: column;
}
</style>
