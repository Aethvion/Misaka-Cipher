<div class="companion-layout axiom-layout">
    <!-- Companion Column (Left) -->
    <div class="companion-avatar-view">
        <div class="axiom-avatar-container">
            <div id="axiom-avatar" class="axiom-avatar axiom-expr-neutral">
                <div class="axiom-hex-outer">
                    <div class="axiom-hex-inner">
                        <span class="axiom-symbol">Λ</span>
                        <div class="axiom-scan-line"></div>
                        <div class="axiom-ring axiom-ring-1"></div>
                        <div class="axiom-ring axiom-ring-2"></div>
                        <div class="axiom-ring axiom-ring-3"></div>
                        <div class="axiom-data-dots">
                            <span></span><span></span><span></span><span></span>
                            <span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="axiom-status-line" class="axiom-status-line">Ready.</div>
        <div id="axiom-mood-badge" class="axiom-mood-badge"></div>
    </div>

    <!-- Chat Column (Middle) -->
    <div class="companion-chat-column">
        <div class="chat-header axiom-chat-header">
            <h2>Axiom</h2>
            <div class="axiom-header-controls">
                <span class="axiom-header-tag">Analytical Unit</span>
                <button id="axiom-settings-btn" class="misaka-settings-btn" title="Axiom Settings"><i class="fas fa-cog"></i></button>
            </div>
        </div>
        <div class="chat-messages" id="axiom-chat-messages">
            <div class="chat-message assistant">
                <div class="message-bubble">Ready. What would you like to know?</div>
            </div>
        </div>
        <div class="chat-input-area axiom-input-area">
            <div class="axiom-input-row">
                <textarea id="axiom-chat-input" placeholder="Ask Axiom..."></textarea>
                <button id="send-axiom-msg" class="axiom-send-btn" title="Send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>
