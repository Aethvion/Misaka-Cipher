<div class="sta-container">

                    <!-- Header -->
                    <div class="sta-header">
                        <button class="back-to-home-btn" onclick="switchMainTab('games-center')" title="Back to Games Center" style="margin-right: 1.5rem; width: 36px; height: 36px;">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <h2 class="sta-header-title"><i class="fas fa-microphone"></i>Are You Smarter Than AI?</h2>
                        <span class="sta-round-indicator" id="sta-round-indicator">Gameshow</span>
                    </div>

                    <!-- Status bar -->
                    <div class="sta-status-bar" id="sta-status-bar"></div>

                    <!-- Lobby screen -->
                    <div class="sta-screen" id="sta-lobby-screen">
                        <div class="sta-lobby">
                            <h1 class="sta-lobby-title">Are You Smarter Than AI?</h1>
                            <p class="sta-lobby-subtitle">Compete against AI models in a trivia gameshow hosted by a Game Master AI.</p>

                            <div class="sta-setup-card">
                                <!-- Game Master -->
                                <div class="sta-section-title">Game Master</div>
                                <div class="sta-setup-row">
                                    <label class="sta-setup-label">GM Model</label>
                                    <select class="sta-setup-select" id="sta-gm-model-select">
                                        <option value="auto">⚡ Auto</option>
                                    </select>
                                </div>
                                <div class="sta-setup-row">
                                    <label class="sta-setup-label">Rounds</label>
                                    <select class="sta-setup-select" id="sta-rounds-select">
                                        <option value="5">5 Rounds</option>
                                        <option value="10">10 Rounds</option>
                                        <option value="15">15 Rounds</option>
                                    </select>
                                    <label class="sta-setup-label" style="min-width:80px;">Time Limit</label>
                                    <select class="sta-setup-select" id="sta-time-select">
                                        <option value="20">20 sec</option>
                                        <option value="30" selected>30 sec</option>
                                        <option value="45">45 sec</option>
                                        <option value="60">60 sec</option>
                                    </select>
                                </div>

                                <!-- Players -->
                                <div class="sta-section-title">Players</div>
                                <div class="sta-player-list" id="sta-player-list"></div>
                                <div class="sta-add-players-row">
                                    <button class="sta-add-btn human" id="sta-add-human-btn">
                                        <i class="fas fa-user"></i> Add Human Player
                                    </button>
                                    <button class="sta-add-btn ai" id="sta-add-ai-btn">
                                        <i class="fas fa-robot"></i> Add AI Player
                                    </button>
                                </div>
                            </div>

                            <button class="sta-start-btn" id="sta-start-btn" disabled>
                                🎤 START SHOW
                            </button>
                        </div>
                    </div>

                    <!-- Game screen -->
                    <div class="sta-screen" id="sta-game-screen" style="display:none;">
                        <div class="sta-question-stage">
                            <!-- Category badge + question -->
                            <span class="sta-category-badge" id="sta-category-badge">Category</span>
                            <div class="sta-question-card">
                                <p class="sta-question-text" id="sta-question-text">Question will appear here...</p>
                            </div>

                            <!-- Timer -->
                            <div class="sta-timer-row">
                                <div class="sta-timer" id="sta-timer" style="--progress:100%">
                                    <span class="sta-timer-num" id="sta-timer-num">30</span>
                                </div>
                            </div>

                            <!-- Human answer input -->
                            <div class="sta-human-input-area" id="sta-human-input-area">
                                <input class="sta-answer-input" id="sta-human-answer-input"
                                       type="text" placeholder="Type your answer and press Enter or Submit..." />
                                <button class="sta-submit-answer-btn" id="sta-submit-answer-btn">Submit</button>
                            </div>

                            <!-- Answers grid -->
                            <div class="sta-answers-section">
                                <div class="sta-answers-title">Player Answers</div>
                                <div class="sta-answers-grid" id="sta-answers-grid"></div>
                            </div>

                            <!-- Correct answer reveal -->
                            <div class="sta-correct-reveal" id="sta-correct-reveal">
                                <div class="sta-correct-reveal-label">Correct Answer</div>
                                <div class="sta-correct-reveal-answer" id="sta-correct-answer-text"></div>
                                <div class="sta-correct-reveal-explanation" id="sta-explanation-text"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Final screen -->
                    <div class="sta-screen" id="sta-final-screen" style="display:none;">
                        <div class="sta-final-screen">
                            <div class="sta-final-trophy" id="sta-final-trophy">🏆</div>
                            <div class="sta-final-title" id="sta-final-title">Winner!</div>
                            <div class="sta-final-winner-name" id="sta-final-winner-name"></div>
                            <div class="sta-final-leaderboard" id="sta-final-leaderboard"></div>
                            <button class="sta-play-again-btn" id="sta-play-again-btn">Play Again</button>
                        </div>
                    </div>

                    <!-- Podiums strip -->
                    <div class="sta-podiums-section" id="sta-podiums-section" style="display:none;">
                        <div class="sta-podiums" id="sta-podiums"></div>
                    </div>

                    <!-- Controls bar (game screen only) -->
                    <div class="sta-controls-bar" id="sta-controls-bar" style="display:none;">
                        <button class="sta-ctrl-btn secondary" id="sta-judge-btn" disabled>⚖️ Judge Now</button>
                        <button class="sta-ctrl-btn primary"   id="sta-next-round-btn" disabled>Next Round →</button>
                    </div>
                </div>
