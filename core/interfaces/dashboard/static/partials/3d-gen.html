<div class="tg-workspace">
    <!-- Left Panel: Control Box -->
    <aside class="tg-controls">
        <div class="tg-controls-header">
            <h3><i class="fas fa-microchip"></i> Generation Model</h3>
        </div>
        
        <div class="tg-tabs">
            <button class="tg-tab-btn active" data-type="i23d">Image to 3D</button>
            <button class="tg-tab-btn" data-type="t23d">Text to 3D</button>
        </div>

        <div class="tg-form-content">
            <!-- Image Input (i23d) -->
            <div id="tg-group-i23d" class="tg-group">
                <label class="tg-label">Reference Image</label>
                <div class="tg-dropzone" id="tg-dropzone">
                    <i class="fas fa-image tg-drop-icon"></i>
                    <p class="tg-drop-text">Click or drag image</p>
                    <img id="tg-preview" class="tg-drop-preview">
                </div>
                <input type="file" id="tg-file-input" hidden accept="image/*">
            </div>

            <!-- Text Input (t23d) -->
            <div id="tg-group-t23d" class="tg-group" style="display:none;">
                <label class="tg-label">Object Description</label>
                <textarea class="tg-textarea" id="tg-prompt" placeholder="Describe the object in detail... e.g. A cyberpunk motorcycle with neon trim, high detail metallic finish..."></textarea>
            </div>

            <!-- Common Settings -->
            <div class="tg-group">
                <label class="tg-label">Primary Model</label>
                <select class="tg-select" id="tg-model-select">
                    <option value="triposr" selected>TripoSR (Stable)</option>
                    <option value="trellis-2">Trellis 2 (WIP)</option>
                </select>
            </div>

            <div class="tg-group">
                <label class="tg-label">Resolution & Quality</label>
                <select class="tg-select" id="tg-quality">
                    <option value="512">512 - Draft</option>
                    <option value="1024" selected>1024 - Standard</option>
                    <option value="2048">2048 - Ultra</option>
                </select>
            </div>

            <div class="tg-group">
                <label class="tg-label">GLB Export Settings</label>
                <div style="display:flex; gap:0.5rem;">
                    <label style="font-size:0.75rem; display:flex; align-items:center; gap:0.4rem; cursor:pointer;">
                        <input type="checkbox" checked id="tg-textured"> Textured
                    </label>
                    <label style="font-size:0.75rem; display:flex; align-items:center; gap:0.4rem; cursor:pointer;">
                        <input type="checkbox" id="tg-pbr"> PBR Maps
                    </label>
                </div>
            </div>
            
            <div class="tg-group">
                <label class="tg-label">Seed</label>
                <input type="number" class="tg-input" id="tg-seed" placeholder="Random">
            </div>
        </div>
    </aside>

    <!-- Center Panel: Viewer -->
    <main class="tg-viewer">
        <div class="tg-viewer-main">
            <!-- Loading Overlay -->
            <div class="tg-loading-overlay" id="tg-loading">
                <div class="tg-loader-sphere"></div>
                <div class="tg-loader-text">GENERATING 3D MODEL</div>
                <div style="font-size:0.7rem; color:var(--text-tertiary); margin-top:-1rem;">Processing meshes and topology...</div>
            </div>

            <!-- Real 3D Viewport (Three.js Engine) -->
            <div id="tg-canvas-root" style="width:100%; height:100%; display:none;">
                <div id="tg-three-container" style="width: 100%; height: 100%; cursor: grab;"></div>
            </div>

            <!-- Control HUD -->
            <div class="tg-canvas-overlay">
                <!-- Lighting Suite (Mood Presets) -->
                <div class="tg-view-modes-grid" style="pointer-events: auto;">
                    <div class="tg-mode-chip active" data-preset="studio" title="Clean, neutral lighting">STUDIO</div>
                    <div class="tg-mode-chip" data-preset="dramatic" title="High contrast & deep shadows">DRAMATIC</div>
                    <div class="tg-mode-chip" data-preset="outdoor" title="Warm sunlight & soft sky">OUTDOOR</div>
                    <div class="tg-mode-chip" data-preset="none" title="No environment lighting">NONE</div>
                </div>

                <!-- View Modes (Shading) -->
                <div class="tg-view-modes-grid" style="pointer-events: auto;">
                    <div class="tg-mode-chip active" data-mode="normal" title="Standard view">NORMAL</div>
                    <div class="tg-mode-chip" data-mode="solid-wire" title="Solid + Wireframe">NORMAL + WIRE</div>
                    <div class="tg-mode-chip" data-mode="wireframe" title="Mesh topology">WIRE</div>
                </div>

                <!-- Utilities (System) -->
                <div class="tg-view-controls-list" style="pointer-events: auto;">
                    <div class="tg-view-control-labeled" title="Lighting Intensity">
                        <i class="fas fa-sun"></i>
                        <input type="range" id="ctrl-light-intensity" min="0" max="3" step="0.1" value="1.0" style="width: 70px; cursor: pointer;">
                    </div>
                    <div class="tg-view-control-labeled active" title="Toggle floor reflection" id="ctrl-floor">
                        <i class="fas fa-layer-group"></i> <span>Floor</span>
                    </div>
                    <div class="tg-view-control-labeled" title="Reset camera view" id="ctrl-reset-cam">
                        <i class="fas fa-camera"></i> <span>Reset View</span>
                    </div>
                </div>
                
                <!-- Technical Stats Panel (Full Info) -->
                <div class="tg-stats-hud" id="tg-model-stats">
                    <!-- Technical data injected here -->
                </div>
            </div>
        </div>

        <div class="tg-gen-bar">
            <button class="tg-btn-primary" id="tg-generate-btn">
                <i class="fas fa-wand-magic-sparkles"></i>
                GENERATE 3D ASSET
            </button>
        </div>
    </main>

    <!-- Right Panel: Assets -->
    <aside class="tg-history">
        <div class="tg-history-header">
            <h4 class="tg-history-title">Recent Assets</h4>
        </div>
        <div class="tg-history-list" id="tg-history-list">
            <!-- Asset cards will be injected here dynamically -->
        </div>
    </aside>
</div>
