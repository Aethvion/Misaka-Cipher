<div class="companion-layout lyra-layout">
    <!-- Companion Column (Left) -->
    <div class="companion-avatar-view">
        <div class="lyra-avatar-container">
            <div id="lyra-avatar" class="lyra-avatar lyra-expr-joyful">
                <div class="lyra-circle-outer">
                    <div class="lyra-circle-inner">
                        <span class="lyra-symbol">♪</span>
                        <div class="lyra-pulse-ring lyra-pulse-1"></div>
                        <div class="lyra-pulse-ring lyra-pulse-2"></div>
                        <div class="lyra-pulse-ring lyra-pulse-3"></div>
                        <div class="lyra-sparkles">
                            <span class="lyra-spark lyra-spark-1">✦</span>
                            <span class="lyra-spark lyra-spark-2">✧</span>
                            <span class="lyra-spark lyra-spark-3">✦</span>
                            <span class="lyra-spark lyra-spark-4">✧</span>
                            <span class="lyra-spark lyra-spark-5">✦</span>
                            <span class="lyra-spark lyra-spark-6">✧</span>
                        </div>
                        <div class="lyra-note-float lyra-note-1">♩</div>
                        <div class="lyra-note-float lyra-note-2">♫</div>
                        <div class="lyra-note-float lyra-note-3">♬</div>
                    </div>
                </div>
            </div>
        </div>
        <div id="lyra-status-line" class="lyra-status-line">The space is open — what shall we make of it?</div>
        <div id="lyra-mood-badge" class="lyra-mood-badge"></div>
    </div>

    <!-- Chat Column (Middle) -->
    <div class="companion-chat-column">
        <div class="chat-header lyra-chat-header">
            <h2>Lyra</h2>
            <div class="lyra-header-controls">
                <span class="lyra-header-tag">Creative Companion</span>
                <button id="lyra-settings-btn" class="misaka-settings-btn" title="Lyra Settings"><i class="fas fa-cog"></i></button>
            </div>
        </div>
        <div class="chat-messages" id="lyra-chat-messages">
            <div class="chat-message assistant">
                <div class="message-bubble">Hello... I've been here, listening to the quiet. What's on your mind?</div>
            </div>
        </div>
        <div class="chat-input-area lyra-input-area">
            <div class="lyra-input-row">
                <textarea id="lyra-chat-input" placeholder="Share something with Lyra..."></textarea>
                <button id="send-lyra-msg" class="lyra-send-btn" title="Send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>
