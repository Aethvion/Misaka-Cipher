<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethvion Finance — Financial Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-darker: #0c0d12;
            --bg-dark: #12141d;
            --bg-card: #1c1f2b;
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --border: #2a2e3a;
            --success: #00f2ad;
            --danger: #ff4b5c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 70px;
            background: rgba(18, 20, 29, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        main {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 30px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .summary-grid {
            grid-column: 1 / 3;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .summary-card {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .summary-card span {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .summary-card h2 {
            font-size: 2rem;
            font-weight: 700;
        }

        .summary-card.accent h2 { color: var(--accent); }
        .summary-card.success h2 { color: var(--success); }
        .summary-card.danger h2 { color: var(--danger); }

        .chart-container {
            height: 350px;
            margin-top: 20px;
        }

        .recent-activity {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .activity-item .info h4 { font-size: 1rem; }
        .activity-item .info p { font-size: 0.8rem; color: var(--text-dim); }
        .activity-item .amount { font-weight: 700; }
        .activity-item .amount.positive { color: var(--success); }
        .activity-item .amount.negative { color: var(--danger); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-darker); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .btn-action {
            background: var(--accent);
            color: var(--bg-darker);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            opacity: 0.9;
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-chart-line-up"></i>
            <span>AETHVION FINANCE</span>
        </div>
        <div class="header-actions">
            <button class="btn-action" id="save-btn">SAVE PROJECT</button>
            <button class="btn-action" id="load-btn">LOAD PROJECTS</button>
        </div>
    </header>

    <main>
        <div class="summary-grid">
            <div class="card summary-card accent">
                <span>Total Net Worth</span>
                <h2 id="total-net-worth">$0.00</h2>
            </div>
            <div class="card summary-card success">
                <span>Monthly Income</span>
                <h2 id="monthly-income">$0.00</h2>
            </div>
            <div class="card summary-card danger">
                <span>Monthly Expenses</span>
                <h2 id="monthly-expenses">$0.00</h2>
            </div>
            <div class="card summary-card">
                <span>Active Savings</span>
                <h2 id="active-savings">$0.00</h2>
            </div>
        </div>

        <div class="card">
            <h3>Financial Performance</h3>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>Recent Transactions</h3>
            <div class="recent-activity" id="transaction-list">
                <!-- Transactions added here -->
                <div class="activity-item">
                    <div class="info">
                        <h4>Aethvion Cloud Subscription</h4>
                        <p>Mar 15, 2026 • Services</p>
                    </div>
                    <div class="amount negative">-$29.99</div>
                </div>
                <div class="activity-item" style="border-left-color: var(--success);">
                    <div class="info">
                        <h4>Stripe Payout</h4>
                        <p>Mar 14, 2026 • Income</p>
                    </div>
                    <div class="amount positive">+$1,540.00</div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
