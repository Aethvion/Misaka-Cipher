<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethvion Photo — Image Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/editor.css">
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Top Toolbar -->
        <header id="top-bar">
            <div class="logo">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>AETHVION PHOTO</span>
            </div>
            <div class="menu-bar">
                <div class="dropdown">
                    <button class="menu-item">File</button>
                    <div class="dropdown-content">
                        <button data-action="file-new">New Workspace</button>
                        <button data-action="file-open">Open Image...</button>
                        <button data-action="file-import">Import Image... (to Layer)</button>
                        <button data-action="file-load">Open Project (Local)</button>
                        <button data-action="file-load-server">Open Project (Server)</button>
                        <hr>
                        <button data-action="file-save">Save Project (Server)</button>
                        <button data-action="file-export">Export as PNG</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="menu-item">Edit</button>
                    <div class="dropdown-content">
                        <button data-action="edit-undo">Undo</button>
                        <button data-action="edit-redo">Redo</button>
                        <hr>
                        <button data-action="edit-clear">Clear Layer</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="menu-item">Image</button>
                    <div class="dropdown-content">
                        <button data-action="image-flip-h">Flip Horizontal</button>
                        <button data-action="image-flip-v">Flip Vertical</button>
                        <hr>
                        <button data-action="image-rotate-90">Rotate 90° CW</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="menu-item">Layer</button>
                    <div class="dropdown-content">
                        <button data-action="layer-new">New Layer</button>
                        <button data-action="layer-duplicate">Duplicate Layer</button>
                        <button data-action="layer-delete">Delete Layer</button>
                        <hr>
                        <button data-action="layer-merge">Merge Down</button>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="menu-item">Filter</button>
                    <div class="dropdown-content">
                        <button data-action="filter-invert">Invert Colors</button>
                        <button data-action="filter-grayscale">Grayscale</button>
                    </div>
                </div>
                <button class="menu-item">View</button>
                <button class="menu-item">Window</button>
            </div>
            <div class="actions">
                <button id="btn-export" class="btn-primary">Export</button>
                <button id="btn-share" class="btn-icon"><i class="fa-solid fa-share-nodes"></i></button>
            </div>
        </header>

        <!-- Workspace Tabs -->
        <nav id="tab-bar">
            <!-- Tabs added dynamically -->
            <button id="add-workspace-btn" title="New Workspace"><i class="fa-solid fa-plus"></i></button>
        </nav>

        <div class="main-container">
            <!-- Left Tool Palette -->
            <aside id="tool-palette">
                <button class="tool-btn active" data-tool="select" title="Move Tool (V)"><i class="fa-solid fa-arrow-pointer"></i></button>
                <button class="tool-btn" data-tool="rect-select" title="Marquee Tool (M)"><i class="fa-solid fa-square"></i></button>
                <button class="tool-btn" data-tool="brush" title="Brush Tool (B)"><i class="fa-solid fa-paintbrush"></i></button>
                <button class="tool-btn" data-tool="eraser" title="Eraser (E)"><i class="fa-solid fa-eraser"></i></button>
                <button class="tool-btn" data-tool="transform" title="Transform (V)"><i class="fa-solid fa-up-down-left-right"></i></button>
                <div class="tool-sep"></div>
                <button class="tool-btn" data-tool="crop" title="Crop Tool (C)"><i class="fa-solid fa-crop-simple"></i></button>
                <button class="tool-btn" data-tool="text" title="Type Tool (T)"><i class="fa-solid fa-t"></i></button>
                <div class="tool-sep"></div>
                <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)"><i class="fa-solid fa-eye-dropper"></i></button>
                <button class="tool-btn" data-tool="zoom" title="Zoom Tool (Z)"><i class="fa-solid fa-magnifying-glass"></i></button>
                
                <div class="color-picker-container">
                    <div class="color-preview" id="color-preview" title="Primary Color"></div>
                    <input type="color" id="active-color" value="#000000">
                </div>
            </aside>

            <!-- Main Workspace -->
            <main id="editor-viewport">
                <div class="canvas-container">
                    <canvas id="main-canvas"></canvas>
                </div>
            </main>

            <!-- Right Sidebar (Layers & Properties) -->
            <aside id="properties-panel">
                <div class="panel-section">
                    <div class="section-header">
                        Canvas Settings
                    </div>
                    <div class="section-body">
                        <div class="control-group">
                            <label>Width</label>
                            <input type="number" id="canvas-width" value="1920">
                        </div>
                        <div class="control-group">
                            <label>Height</label>
                            <input type="number" id="canvas-height" value="1080">
                        </div>
                        <button class="btn-secondary" id="apply-canvas-size">Apply Resolution</button>
                    </div>
                </div>

                <div class="panel-section" id="navigator">
                    <div class="section-header">Navigator</div>
                    <div class="section-body">
                        <div id="nav-preview"></div>
                    </div>
                </div>

                <div class="panel-section" id="properties">
                    <div class="section-header">Filters</div>
                    <div class="section-body" id="filter-controls">
                        <div class="control-group">
                            <label>Brightness</label>
                            <input type="range" data-filter="brightness" min="0" max="200" value="100">
                        </div>
                        <div class="control-group">
                            <label>Contrast</label>
                            <input type="range" data-filter="contrast" min="0" max="200" value="100">
                        </div>
                        <div class="control-group">
                            <label>Saturation</label>
                            <input type="range" data-filter="saturate" min="0" max="200" value="100">
                        </div>
                        <div class="control-group">
                            <label>Blur</label>
                            <input type="range" data-filter="blur" min="0" max="20" value="0">
                        </div>
                        <div class="control-group">
                            <label>Grayscale</label>
                            <input type="range" data-filter="grayscale" min="0" max="100" value="0">
                        </div>
                        <div class="control-group">
                            <label>Sepia</label>
                            <input type="range" data-filter="sepia" min="0" max="100" value="0">
                        </div>
                        <button id="reset-filters" class="btn-secondary">Reset Filters</button>
                    </div>
                </div>

                <div class="panel-section" id="layers" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                    <div class="section-header">
                        <span>Layers</span>
                        <div class="header-actions">
                            <button id="add-layer-btn"><i class="fa-solid fa-plus"></i></button>
                            <button id="del-layer-btn"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="section-body" style="flex: 1; overflow-y: auto;">
                        <ul id="layer-stack">
                            <!-- Layer items added dynamically -->
                        </ul>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Footer / Status Bar -->
        <footer id="status-bar">
            <div id="zoom-display">Zoom: 100%</div>
            <div id="coord-display">0 : 0 px</div>
            <div id="system-status">System Ready</div>
        </footer>
    </div>

    <!-- Modals / Overlays -->
    <div id="overlay-container"></div>

    <script src="js/canvas_engine.js" type="module"></script>
    <script src="js/app.js" type="module"></script>
</body>
</html>
