<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethvion Audio Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/viewer/style.css">
</head>
<body>
<div id="app">

    <!-- ═══ HEADER ═══ -->
    <header class="ae-header">
        <div class="ae-logo"><i class="fas fa-wave-square"></i> Aethvion Audio</div>
        <div class="ae-header-sep"></div>
        <div class="ae-header-meta" id="header-meta">
            <span class="ae-badge" id="hdr-tracks">0 tracks</span>
            <span class="ae-badge" id="hdr-workspace">0:00</span>
        </div>
    </header>

    <!-- ═══ TOOLBAR ═══ -->
    <div class="ae-toolbar">
        <button class="ae-btn primary" id="btn-add-track">
            <i class="fas fa-plus"></i> TRACK
        </button>
        <input type="file" id="file-input" accept="audio/*" multiple>

        <div class="ae-toolbar-sep"></div>

        <button class="ae-btn play-btn" id="btn-play-mix" disabled>
            <i class="fas fa-play" id="mix-play-icon"></i>
            <span id="mix-play-label">PLAY MIX</span>
        </button>
        <button class="ae-btn" id="btn-stop-mix" disabled title="Stop">
            <i class="fas fa-stop"></i>
        </button>
        <button class="ae-btn" id="btn-rewind" disabled title="Rewind to start">
            <i class="fas fa-fast-backward"></i>
        </button>

        <div class="ae-toolbar-sep"></div>

        <button class="ae-btn" id="btn-zoom-in" title="Zoom in">
            <i class="fas fa-search-plus"></i>
        </button>
        <button class="ae-btn" id="btn-zoom-out" title="Zoom out">
            <i class="fas fa-search-minus"></i>
        </button>

        <div class="ae-toolbar-sep"></div>

        <label class="ae-toolbar-label">Workspace</label>
        <input type="number" id="workspace-input" class="ae-num-input" min="1" step="1"
            value="30" title="Total workspace length in seconds">
        <span class="ae-toolbar-unit">s</span>

        <div class="ae-toolbar-sep"></div>

        <button class="ae-btn success" id="btn-export-wav" disabled title="Export mix as WAV">
            <i class="fas fa-download"></i> WAV
        </button>
        <button class="ae-btn success" id="btn-export-mp3" disabled title="Export mix as MP3">
            <i class="fas fa-download"></i> MP3
        </button>
    </div>

    <!-- ═══ MAIN CONTENT ═══ -->
    <div class="ae-main">

        <!-- ─── TRACKS AREA ─── -->
        <div class="ae-tracks-area">

            <!-- Left: Track header column -->
            <div class="ae-headers-col" id="headers-col">
                <!-- Ruler corner (aligns with timeline ruler) -->
                <div class="ae-ruler-corner">
                    <span class="ae-ruler-corner-label">TRACKS</span>
                </div>
                <!-- Per-track header rows (populated by JS) -->
                <div id="headers-body"></div>
                <!-- Add track button row -->
                <div class="ae-add-track-row" id="btn-add-track-row">
                    <i class="fas fa-plus"></i> ADD TRACK
                </div>
            </div>

            <!-- Right: Scrollable timeline -->
            <div class="ae-timeline-scroll" id="timeline-scroll">
                <div class="ae-timeline-inner" id="timeline-inner">
                    <!-- Ruler (sticky top) -->
                    <canvas class="ae-ruler" id="ruler"></canvas>
                    <!-- Playhead (spans all rows) -->
                    <div class="ae-playhead" id="playhead"></div>
                    <!-- Track clip rows (populated by JS) -->
                    <div id="rows-body"></div>
                    <!-- Empty state -->
                    <div class="ae-timeline-empty" id="timeline-empty">
                        <i class="fas fa-wave-square"></i>
                        <p>Drop audio files here or click <strong>+ TRACK</strong></p>
                    </div>
                </div>
            </div>

        </div>

        <!-- ─── EFFECTS PANEL ─── -->
        <div class="ae-fx-panel" id="fx-panel">
            <div class="ae-fx-panel-header">
                <i class="fas fa-magic" style="color:var(--primary)"></i>
                <span>FX —</span>
                <span class="ae-fx-track-name" id="fx-track-name">select a track</span>
                <div style="flex:1"></div>
                <!-- Add effect form -->
                <div class="ae-add-fx-form" id="add-fx-form">
                    <select class="ae-select" id="fx-op-select">
                        <option value="fade_in">Fade In</option>
                        <option value="fade_out">Fade Out</option>
                        <option value="normalize">Normalize</option>
                        <option value="volume">Gain</option>
                        <option value="speed">Speed</option>
                        <option value="reverse">Reverse</option>
                        <option value="crop_silence">Crop Silence</option>
                    </select>
                    <!-- Dynamic param inputs rendered by JS -->
                    <div id="fx-param-inputs" class="ae-fx-param-row"></div>
                    <button class="ae-btn primary" id="btn-apply-fx" disabled>
                        <i class="fas fa-plus"></i> ADD
                    </button>
                </div>
            </div>
            <!-- Effect chips list -->
            <div class="ae-fx-chips-wrap" id="fx-chips-wrap">
                <div class="ae-fx-empty" id="fx-empty">Select a track to see its effects</div>
                <div class="ae-fx-chips" id="fx-chips"></div>
            </div>
        </div>

    </div>

    <!-- ═══ MIX PLAYBAR ═══ -->
    <div class="ae-mix-bar">
        <audio id="mix-audio"></audio>
        <div class="ae-time-display">
            <span class="ae-time" id="mix-cur">0:00.0</span>
            <span style="color:var(--text-secondary); margin:0 4px">/</span>
            <span class="ae-time" id="mix-dur">0:00.0</span>
        </div>
        <div class="ae-progress-wrap" id="mix-progress-wrap">
            <div class="ae-progress-fill" id="mix-progress-fill"></div>
        </div>
        <div style="flex:1"></div>
        <i class="fas fa-volume-up" style="color:var(--primary); font-size:0.8rem"></i>
        <input type="range" id="mix-vol" min="0" max="1" step="0.01" value="1"
            style="width:72px; margin-left:6px;">
    </div>

</div>

<!-- Loading overlay -->
<div id="ae-loading">
    <div class="ae-spinner"></div>
    <span id="ae-load-msg">PROCESSING...</span>
</div>

<!-- Notifications -->
<div id="ae-notifications"></div>

<script src="/viewer/app.js"></script>
</body>
</html>
