<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Specter — VTuber Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/viewer/css/editor.css" />
</head>
<body>

<!-- ── Top Bar ─────────────────────────────────────────────────── -->
<header id="topbar">
  <div class="tb-brand">
    <div class="tb-logo"><i class="fa-solid fa-ghost"></i></div>
    <span class="tb-title">SPECTER</span>
    <span class="tb-version">v2.0</span>
  </div>

  <nav class="tb-modes" id="modeBar">
    <button class="mode-btn active" data-mode="generate" title="Generate"><i class="fa-solid fa-wand-magic-sparkles"></i><span>Generate</span></button>
    <button class="mode-btn" data-mode="edit"     title="Edit Layers"><i class="fa-solid fa-layer-group"></i><span>Edit</span></button>
    <button class="mode-btn" data-mode="mesh"     title="Mesh Editor"><i class="fa-solid fa-bezier-curve"></i><span>Mesh</span></button>
    <button class="mode-btn" data-mode="bones"    title="Bone Rig"><i class="fa-solid fa-bone"></i><span>Bones</span></button>
    <button class="mode-btn" data-mode="weights"  title="Weight Painting"><i class="fa-solid fa-paint-brush"></i><span>Weights</span></button>
    <button class="mode-btn" data-mode="physics"  title="Physics"><i class="fa-solid fa-wind"></i><span>Physics</span></button>
    <button class="mode-btn" data-mode="preview"  title="Preview Animation"><i class="fa-solid fa-play"></i><span>Preview</span></button>
    <button class="mode-btn" data-mode="live"     title="Live Tracking"><i class="fa-solid fa-satellite-dish"></i><span>Live</span></button>
  </nav>

  <div class="tb-actions">
    <button class="tb-btn" id="btnNewModel"  title="New Model"><i class="fa-solid fa-file-circle-plus"></i></button>
    <button class="tb-btn" id="btnOpenModel" title="Open .specter"><i class="fa-solid fa-folder-open"></i></button>
    <button class="tb-btn" id="btnSaveModel" title="Save"><i class="fa-solid fa-floppy-disk"></i></button>
    <button class="tb-btn accent" id="btnExport" title="Export .specter"><i class="fa-solid fa-download"></i> Export</button>
    <a class="tb-btn" href="/tutorial" target="_blank" title="Getting Started Tutorial — opens in new tab" style="text-decoration:none;"><i class="fa-solid fa-graduation-cap"></i></a>
    <a class="tb-btn" href="/docs" target="_blank" title="Documentation — opens in new tab" style="text-decoration:none;"><i class="fa-solid fa-book-open"></i></a>
    <input type="file" id="fileInput" accept=".specter,.png,.jpg,.jpeg" style="display:none" />
  </div>
</header>

<!-- ── Main Layout ─────────────────────────────────────────────── -->
<div id="appLayout">

  <!-- Left Panel -->
  <aside id="leftPanel">
    <div class="panel-section" id="layerSection">
      <div class="panel-header">
        <span>Layers</span>
        <div class="panel-header-actions">
          <button class="icon-btn" id="btnAddLayer" title="Import Image"><i class="fa-solid fa-plus"></i></button>
          <button class="icon-btn" id="btnDeleteLayer" title="Delete Layer"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
      <div id="layerList" class="layer-list"></div>
    </div>

    <div class="panel-divider"></div>

    <div class="panel-section" id="boneSection">
      <div class="panel-header">
        <span>Bones</span>
        <div class="panel-header-actions">
          <button class="icon-btn" id="btnAddBone" title="Add Root Bone"><i class="fa-solid fa-plus"></i></button>
          <button class="icon-btn" id="btnDeleteBone" title="Delete Bone"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
      <div id="boneTree" class="bone-tree"></div>
    </div>

    <div class="panel-divider"></div>

    <div class="panel-section" id="paramSection">
      <div class="panel-header"><span>Parameters</span></div>
      <div id="paramList" class="param-list"></div>
    </div>
  </aside>

  <!-- Canvas Area -->
  <main id="canvasArea">
    <!-- Mode-specific toolbars -->
    <div id="toolBar" class="tool-bar">
      <!-- Populated by JS per mode -->
    </div>

    <!-- Canvas host -->
    <div id="canvasHost">
      <canvas id="mainCanvas"></canvas>
      <!-- Overlay for bone/mesh/weight editing (SVG layer) -->
      <svg id="overlaysvg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- Bottom controls -->
    <div id="bottomBar">
      <div class="zoom-controls">
        <button class="icon-btn" id="btnZoomOut"><i class="fa-solid fa-minus"></i></button>
        <span id="zoomLabel">100%</span>
        <button class="icon-btn" id="btnZoomIn"><i class="fa-solid fa-plus"></i></button>
        <button class="icon-btn" id="btnZoomFit" title="Fit to screen"><i class="fa-solid fa-expand"></i></button>
      </div>
      <div id="statusMsg" class="status-msg">Ready</div>
      <div class="playback-controls" id="playbackControls" style="display:none">
        <button class="icon-btn" id="btnPlayPause"><i class="fa-solid fa-play"></i></button>
        <span class="anim-name" id="animName">idle</span>
      </div>
    </div>
  </main>

  <!-- Right Panel -->
  <aside id="rightPanel">
    <!-- Inspector: changes based on mode + selection -->
    <div id="inspector">
      <!-- Populated by JS -->
    </div>
  </aside>
</div>

<!-- ── Mode Panels (overlay, shown contextually) ────────────────── -->

<!-- Generate Panel -->
<div id="generatePanel" class="side-overlay active">
  <div class="overlay-header">Character Generation</div>

  <div class="field-group">
    <label>Pipeline</label>
    <div class="pill-group" id="pipelinePills">
      <button class="pill active" data-val="sheet">AI Sheet</button>
      <button class="pill" data-val="simple">Upload</button>
      <button class="pill" data-val="local">Local SD</button>
    </div>
  </div>

  <!-- Upload panel (simple) -->
  <div id="uploadPanel" class="gen-sub" style="display:none">
    <label class="upload-zone" id="uploadZone">
      <i class="fa-solid fa-cloud-arrow-up"></i>
      <span>Drop image or click to upload</span>
      <input type="file" id="uploadImageInput" accept="image/*" style="display:none"/>
    </label>
    <img id="uploadPreview" style="display:none; max-width:100%; border-radius:8px; margin-top:8px;" />
  </div>

  <!-- Sheet / Local prompt -->
  <div id="promptPanel" class="gen-sub">
    <div class="field-group">
      <label>Prompt</label>
      <textarea id="genPrompt" rows="4" placeholder="Anime vtuber girl, silver hair, blue eyes, white outfit..."></textarea>
    </div>
  </div>

  <div class="field-group">
    <label>Custom instructions</label>
    <textarea id="genInstructions" rows="2" placeholder="Optional rigging hints..."></textarea>
  </div>

  <div class="field-group">
    <label>Mesh density</label>
    <select id="meshDensity">
      <option value="low">Low (quad)</option>
      <option value="medium" selected>Medium (4×4)</option>
      <option value="high">High (8×8)</option>
      <option value="ai">AI adaptive</option>
    </select>
  </div>

  <div class="field-group">
    <label>Bone style</label>
    <select id="boneStyle">
      <option value="humanoid" selected>Humanoid</option>
      <option value="minimal">Minimal</option>
      <option value="custom">AI custom</option>
    </select>
  </div>

  <div class="field-group">
    <label>Image model</label>
    <select id="imageModelSel"><option value="">Auto</option></select>
  </div>
  <div class="field-group">
    <label>Chat model</label>
    <select id="chatModelSel"><option value="">Auto</option></select>
  </div>

  <div class="gen-actions">
    <button class="btn-primary" id="btnGenerateConcept">
      <i class="fa-solid fa-wand-magic-sparkles"></i> Generate
    </button>
  </div>

  <!-- Concept preview -->
  <div id="conceptPreview" style="display:none; margin-top:12px;">
    <img id="conceptImg" style="width:100%; border-radius:8px;" />
    <div class="gen-actions" style="margin-top:8px;">
      <button class="btn-primary" id="btnRigConcept">
        <i class="fa-solid fa-bone"></i> Rig It!
      </button>
    </div>
  </div>
</div>

<!-- Weight brush overlay (shown in weight mode) -->
<div id="weightBrushOverlay" style="display:none; position:fixed; bottom:60px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 16px; display:none; gap:12px; align-items:center; z-index:100;">
  <label style="font-size:11px; color:var(--text-dim);">Radius</label>
  <input type="range" id="brushRadius" min="10" max="200" value="60" style="width:100px;" />
  <label style="font-size:11px; color:var(--text-dim);">Strength</label>
  <input type="range" id="brushStrength" min="1" max="100" value="50" style="width:100px;" />
  <label style="font-size:11px; color:var(--text-dim);">Mode</label>
  <select id="brushMode" style="font-size:12px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:2px 6px;">
    <option value="add">Add</option>
    <option value="subtract">Subtract</option>
    <option value="smooth">Smooth</option>
  </select>
</div>

<!-- Loading overlay -->
<div id="loadingOverlay" style="display:none;">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loadingMsg">Working...</div>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<!-- ── Scripts ──────────────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<script type="module" src="/viewer/js/app.js"></script>
</body>
</html>
